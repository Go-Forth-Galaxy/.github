name: Bug Report
description: Report a defect or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and resolve the issue quickly.

  - type: input
    id: page
    attributes:
      label: What page are you experiencing an issue on?
      description: URL or name of the page/screen where the issue occurs.
      placeholder: e.g. https://app.example.com/dashboard or "Settings > Billing"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to produce issue
      description: List the exact steps needed to trigger the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Anything else that might help - related issues, recent changes, workarounds you've tried, etc.

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag and drop image, video, or other files here to attach them.

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did this happen?
      options:
        - Production
        - Development
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Optional - what version, release, or commit SHA are you on?
      placeholder: e.g. v1.4.2 or commit abc123
