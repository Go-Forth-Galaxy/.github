# Disable the "Open a blank issue" link to force users to pick a template.
blank_issues_enabled: false

# Optional contact links shown above the template chooser.
# Edit URLs/emails below to match your real destinations.
contact_links:
  - name: Question or discussion
    url: https://github.com/orgs/Go-Forth-Galaxy/discussions
    about: For questions, ideas, or general discussion, please use Discussions instead of opening an issue.
  - name: Security vulnerability (private disclosure)
    url: https://github.com/Go-Forth-Galaxy/.github/security/advisories/new
    about: Report exploitable security issues privately. Do NOT open a public issue.
  - name: Documentation
    url: https://github.com/Go-Forth-Galaxy/.github
    about: Read our org-wide contributing and process docs.
